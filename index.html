<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2B Wholesale Catalog</title>
        <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
        <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="modal-overlay" id="productModal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <div class="modal-img-area" id="modalImg"></div>
            <div class="modal-info-area" id="modalInfo"></div>
        </div>
    </div>
    <header class="catalog-header">
        <h1>Wholesale Catalog</h1>
        <p>PLAYCACTUS</p>
        
        <div class="search-container">
            <div class="search-input-wrapper">
                <span class="search-icon"></span>
                <input type="text" id="searchInput" class="search-input" placeholder="모델명 연속 검색 (예: 5188 5302 5304)">
            </div>
        </div>
    </header>
    <div class="container">
        <div id="loading">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingMsg">데이터를 불러오는 중입니다...</div>
        </div>
                <div class="category-filter-wrap" id="category-filters" style="display:none;"></div>
        
        <div id="no-results">검색된 상품이 없습니다.</div>
        
        <div class="ws-grid" id="catalog-grid"></div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
