<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2B Wholesale Catalog - Excel Import</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #1A237E; 
            --primary-light: #534BAE;
            --excel-green: #107C41;
            --excel-green-hover: #185C37;
            --bg-base: #F5F7FA;
            --surface: #FFFFFF;
            --border: #E4E7EB;
            --text-head: #111827;
            --text-main: #374151;
            --text-sub: #6B7280;
            
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --radius-md: 8px;
            --font-main: 'Pretendard', -apple-system, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-main); background-color: var(--bg-base); color: var(--text-main); line-height: 1.6; padding-bottom: 100px; }

        /* Header */
        .catalog-header {
            background-color: var(--surface);
            padding: 50px 20px 40px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            margin-bottom: 30px;
        }
        .catalog-header h1 {
            font-size: 2.2rem;
            color: var(--text-head);
            font-weight: 900;
            letter-spacing: -0.03em;
            margin-bottom: 12px;
            outline: none;
        }
        .catalog-header p { 
            color: var(--text-sub); 
            font-size: 1.1rem; 
            outline: none;
        }
        .editable:focus { background-color: #fef08a; border-radius: 4px; padding: 0 4px; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        
        /* Category Filters */
        .category-filter-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 40px;
        }
        .filter-btn {
            background-color: var(--surface);
            color: var(--text-sub);
            border: 1px solid var(--border);
            padding: 8px 24px;
            border-radius: 999px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            outline: none;
            box-shadow: var(--shadow-sm);
        }
        .filter-btn:hover { border-color: var(--primary); color: var(--primary); }
        .filter-btn.active {
            background-color: var(--primary);
            color: #fff;
            border-color: var(--primary);
            box-shadow: 0 4px 10px rgba(26, 35, 126, 0.2);
        }

        /* Toolbar */
        .toolbar {
            display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center;
            background: var(--surface); padding: 15px 20px; border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm); margin-bottom: 30px; gap: 15px;
        }
        .toolbar-group { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        
        .btn {
            background-color: var(--primary); color: white; border: none;
            padding: 10px 16px; border-radius: 6px; font-size: 0.9rem; font-weight: 600;
            cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px;
        }
        .btn:hover { background-color: var(--primary-light); transform: translateY(-1px); }
        .btn-excel { background-color: var(--excel-green); }
        .btn-excel:hover { background-color: var(--excel-green-hover); }
        .btn-outline { background-color: transparent; color: var(--text-main); border: 1px solid var(--border); }
        .btn-outline:hover { background-color: #f9fafb; }
        .btn-danger { background-color: transparent; color: #ef4444; border: 1px solid #fca5a5; }
        .btn-danger:hover { background-color: #fef2f2; }

        /* Grid */
        .ws-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        @media(min-width: 768px) { .ws-grid { grid-template-columns: repeat(3, 1fr); gap: 24px; } }
        @media(min-width: 1024px) { .ws-grid { grid-template-columns: repeat(4, 1fr); gap: 24px; } }

        /* Card */
        .ws-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm); overflow: hidden; transition: all 0.3s ease; position: relative;
        }
        .ws-card:hover { box-shadow: var(--shadow-md); border-color: #cbd5e1; transform: translateY(-3px); }
        .ws-card.hidden { display: none !important; } /* For filtering */
        
        .delete-btn {
            position: absolute; top: 10px; right: 10px;
            background: rgba(255,255,255,0.9); border: 1px solid #ddd; border-radius: 50%;
            width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 20; font-size: 14px; color: #ef4444; opacity: 0; transition: opacity 0.2s; pointer-events: none;
        }
        body.edit-mode .ws-card:hover .delete-btn { opacity: 1; pointer-events: auto; }

        .ws-category-badge {
            position: absolute; top: 8px; left: 8px; z-index: 10;
            background: rgba(26, 35, 126, 0.85); color: #fff; font-size: 0.65rem; font-weight: 700;
            padding: 3px 8px; border-radius: 4px; letter-spacing: 0.05em; backdrop-filter: blur(4px);
        }
        @media(min-width: 768px) {
            .ws-category-badge { top: 12px; left: 12px; font-size: 0.75rem; padding: 4px 10px; }
        }

        /* Image Drag & Drop */
        .ws-img-wrap { position: relative; width: 100%; padding-top: 100%; background-color: #f3f4f6; border-bottom: 1px solid var(--border); }
        .img-box {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            border: 2px dashed #d1d5db; margin: -1px; cursor: pointer; overflow: hidden; transition: all 0.2s;
            touch-action: pan-y; /* 스와이프를 위해 y축 스크롤만 허용 */
        }
        .img-box.drag-over { background-color: #e0e7ff; border-color: var(--primary); }
        .img-box.filled { border: none; background: transparent; }
        .img-box::after {
            content: "📷 드래그 앤 드롭\A(또는 클릭하여 이미지 삽입)"; white-space: pre-wrap;
            color: #9ca3af; font-size: 0.9rem; text-align: center; line-height: 1.5; position: absolute; pointer-events: none;
        }
        .img-box.filled::after { display: none; }
        .preview-img { width: 100%; height: 100%; object-fit: contain; background-color: #ffffff; pointer-events: none; }

        /* Slider Styles */
        .slider-container { position: relative; width: 100%; height: 100%; display: flex; overflow: hidden; }
        .slider-img { min-width: 100%; height: 100%; object-fit: contain; background-color: #ffffff; transition: transform 0.3s ease; pointer-events: none; }
        .slider-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.4); color: white; border: none; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 50%; z-index: 10; font-size: 12px; outline: none; }
        @media(min-width: 768px) { .slider-btn { width: 32px; height: 32px; font-size: 14px; } }
        .slider-btn:hover { background: rgba(0,0,0,0.7); }
        .slider-btn.prev { left: 4px; }
        .slider-btn.next { right: 4px; }
        @media(min-width: 768px) { .slider-btn.prev { left: 8px; } .slider-btn.next { right: 8px; } }
        .slider-dots { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; z-index: 10; }
        @media(min-width: 768px) { .slider-dots { bottom: 12px; gap: 6px; } }
        .slider-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.6); cursor: pointer; border: 1px solid rgba(0,0,0,0.2); }
        @media(min-width: 768px) { .slider-dot { width: 8px; height: 8px; } }
        .slider-dot.active { background: var(--primary); border-color: var(--primary); }

        /* Card Info */
        .ws-info { padding: 12px; }
        .ws-head-row { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #f3f4f6; }
        .ws-title-box { width: 100%; }
        .ws-info-block { margin-bottom: 8px; }
        .ws-info-block:last-child { margin-bottom: 0; }
        .ws-label-tag { font-size: 0.65rem; font-weight: 800; letter-spacing: 0.05em; padding: 2px 4px; border-radius: 4px; margin-bottom: 2px; display: inline-block; }
        .ws-label-tag.primary { background: #e0e7ff; color: var(--primary); }
        .ws-label-tag.gray { background: #f3f4f6; color: #6b7280; }
        .ws-code { font-size: 1.1rem; font-weight: 900; color: var(--text-head); line-height: 1.2; word-break: keep-all; outline: none; display: block; }
        .ws-name { font-size: 0.85rem; font-weight: 600; color: var(--text-main); line-height: 1.3; word-break: keep-all; outline: none; display: block; }

        .ws-price-box { width: 100%; text-align: left; }
        .ws-price-label { font-size: 0.65rem; color: var(--text-sub); font-weight: 600; display: block; margin-bottom: 2px; }
        .ws-price { font-size: 1.15rem; font-weight: 800; color: var(--text-head); letter-spacing: -0.02em; outline: none; }
        .ws-retail { font-size: 0.75rem; color: #9ca3af; text-decoration: none; margin-top: 2px; display: block; outline: none; }

        /* Specs */
        .ws-specs { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        .ws-specs th, .ws-specs td { padding: 4px 0; border-bottom: 1px dashed #e5e7eb; text-align: left; }
        .ws-specs tr:last-child th, .ws-specs tr:last-child td { border-bottom: none; padding-bottom: 0; }
        .ws-specs th { width: 25%; color: var(--text-sub); font-weight: 600; }
        .ws-specs td { color: var(--text-main); font-weight: 500; outline: none; }

        @media(min-width: 768px) {
            .ws-info { padding: 20px; }
            .ws-head-row { flex-direction: row; justify-content: space-between; align-items: flex-start; gap: 0; margin-bottom: 16px; padding-bottom: 16px; }
            .ws-title-box { flex: 1; padding-right: 16px; width: auto; }
            .ws-info-block { margin-bottom: 12px; }
            .ws-label-tag { font-size: 0.7rem; padding: 2px 6px; margin-bottom: 4px; }
            .ws-code { font-size: 1.35rem; }
            .ws-name { font-size: 0.95rem; }
            .ws-price-box { text-align: right; flex-shrink: 0; width: auto; }
            .ws-price-label { font-size: 0.75rem; }
            .ws-price { font-size: 1.4rem; }
            .ws-retail { font-size: 0.8rem; margin-top: 4px; }
            .ws-specs { font-size: 0.9rem; }
            .ws-specs th, .ws-specs td { padding: 8px 0; }
        }

        /* Modal Styles */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s; padding: 16px; }
        .modal-overlay.show { display: flex; opacity: 1; }
        .modal-content { background: var(--surface); border-radius: var(--radius-md); width: 100%; max-width: 900px; max-height: 90vh; position: relative; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
        @media(min-width: 768px) { .modal-content { flex-direction: row; } }
        .modal-close { position: absolute; top: 12px; right: 12px; background: rgba(255,255,255,0.9); color: #333; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 100; font-size: 20px; border: none; box-shadow: var(--shadow-sm); }
        .modal-close:hover { background: #f3f4f6; }
        .modal-img-area { width: 100%; position: relative; padding-top: 100%; background: #f3f4f6; flex-shrink: 0; }
        @media(min-width: 768px) { .modal-img-area { width: 50%; padding-top: 50%; border-right: 1px solid var(--border); } }
        .modal-info-area { width: 100%; padding: 24px; display: flex; flex-direction: column; overflow-y: auto; }
        @media(min-width: 768px) { .modal-info-area { width: 50%; padding: 40px; } }
        
        .modal-info-area .ws-info { padding: 0; }
        .modal-info-area .ws-head-row { flex-direction: column; gap: 12px; margin-bottom: 20px; padding-bottom: 20px; }
        .modal-info-area .ws-code { font-size: 1.6rem; }
        .modal-info-area .ws-name { font-size: 1.1rem; }
        .modal-info-area .ws-price-box { text-align: left; width: 100%; }
        .modal-info-area .ws-price { font-size: 1.6rem; }
        .modal-info-area .ws-specs { font-size: 0.95rem; }
        .modal-info-area .ws-specs th, .modal-info-area .ws-specs td { padding: 10px 0; }

        body:not(.edit-mode) .img-box { cursor: zoom-in; }

        /* Image Edit Toolbar */
        .img-edit-toolbar { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); z-index: 50; display: flex; gap: 8px; background: rgba(0,0,0,0.7); padding: 6px 12px; border-radius: 20px; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
        body.edit-mode .img-box:hover .img-edit-toolbar { opacity: 1; pointer-events: auto; }
        .img-edit-toolbar button { background: none; border: none; color: white; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 50%; }
        .img-edit-toolbar button:hover { background: rgba(255,255,255,0.2); }

        /* Guide Box */
        .guide-box {
            background: #e0f2fe; border: 1px solid #bae6fd; color: #0369a1;
            padding: 15px 20px; border-radius: var(--radius-md); margin-bottom: 20px;
            font-size: 0.9rem; line-height: 1.6; display: flex; align-items: flex-start; gap: 10px;
        }
    </style>
</head>
<body class="edit-mode">

    <!-- 팝업 모달 영역 -->
    <div class="modal-overlay" id="productModal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <div class="modal-img-area" id="modalImg"></div>
            <div class="modal-info-area" id="modalInfo"></div>
        </div>
    </div>

    <header class="catalog-header">
        <h1 class="editable" contenteditable="true">B2B Wholesale Catalog</h1>
        <p class="editable" contenteditable="true">2025 S/S 시즌 도매 단가표 및 상품 스펙 (최소 주문 수량: 컬러별 1세트)</p>
    </header>

    <div class="container">
        
        <div class="guide-box" id="guideBox">
            <span style="font-size: 1.5rem;">💡</span>
            <div>
                <strong>업데이트: 엑셀 이미지 다중 URL(슬라이드) 연동 지원!</strong><br>
                1. 샘플 엑셀 파일에 <b>'이미지URL1~5'</b> 열이 추가되었습니다. URL을 여러 개 넣으면 카드가 자동으로 <b>좌우로 넘겨보는 슬라이드 형태</b>가 됩니다.<br>
                2. 이미지가 없는 칸은 이전처럼 카드 생성 후 <b>직접 드래그&드롭</b> 하거나 <b>클릭해서 업로드</b> 할 수 있습니다.<br>
                3. 업로드된 이미지도 다른 이미지로 드래그(또는 클릭)해서 언제든 수정 가능합니다.
            </div>
            <button class="btn btn-outline" style="margin-left:auto; padding: 4px 8px; font-size: 0.8rem;" onclick="document.getElementById('guideBox').style.display='none'">닫기</button>
        </div>

        <div class="toolbar">
            <div class="toolbar-group">
                <button class="btn btn-excel" onclick="downloadExcelTemplate()">📊 샘플 엑셀 다운로드</button>
                <button class="btn btn-excel" onclick="document.getElementById('excelUpload').click()">📁 엑셀 파일 업로드</button>
                <input type="file" id="excelUpload" accept=".xlsx, .xls, .csv" style="display: none;" onchange="handleExcelUpload(event)">
                <button class="btn btn-excel" style="background-color: #059669;" onclick="exportToExcel()">📤 현재 화면 엑셀로 내보내기</button>
            </div>
            <div class="toolbar-group">
                <button class="btn btn-outline" onclick="addCard()">➕ 빈 카드 1개 추가</button>
                <button class="btn btn-danger" onclick="clearAllCards()">🗑️ 전체 삭제</button>
                <div style="width: 1px; height: 24px; background: #ddd; margin: 0 5px;"></div>
                <button class="btn" onclick="saveHTML()">💾 최종 HTML 저장</button>
            </div>
        </div>

        <!-- 엑셀 데이터 기반으로 자동 생성되는 카테고리 필터 버튼 영역 -->
        <div class="category-filter-wrap" id="category-filters">
            <button class="filter-btn active" onclick="filterCategory('ALL')">전체보기</button>
            <button class="filter-btn" onclick="filterCategory('스니커즈')">스니커즈</button>
            <button class="filter-btn" onclick="filterCategory('로퍼/구두')">로퍼/구두</button>
        </div>

        <div class="ws-grid" id="catalog-grid">
            <!-- 초기 샘플 카드 -->
        </div>
    </div>

    <script>
        // === 1. 엑셀 관련 기능 ===
        function downloadExcelTemplate() {
            // 헤더 순서 변경: 품번/컬러/사이즈/소재/굽높이/도매가/소비자가/분류/이미지1~5
            const headers = ["품번", "컬러", "사이즈", "소재", "굽높이", "도매가", "소비자가", "분류(카테고리)", "상품명", "이미지URL1", "이미지URL2", "이미지URL3", "이미지URL4", "이미지URL5"];
            
            const data = [
                headers,
                ["8023", "블랙, 다크브라운, 아이보리", "230 ~ 250 (5단위)", "합성피혁 (PU)", "3cm", 24000, 48000, "로퍼/구두", "베이직 스퀘어 로퍼", "https://via.placeholder.com/400?text=Loafer+Main", "https://via.placeholder.com/400/eeeeee?text=Loafer+Detail", "", "", ""],
                ["9105", "블랙, 화이트", "225 ~ 250 (5단위)", "천연 소가죽 (Cow Leather)", "4cm (속굽 포함)", 38000, 79000, "스니커즈", "천연 소가죽 슬립온", "https://via.placeholder.com/400?text=Sneakers", "", "", "", ""],
                ["5501", "블랙, 베이지, 와인", "230 ~ 250 (5단위)", "인조 스웨이드", "1.5cm", 19000, 38000, "기타", "스웨이드 메리제인", "", "", "", "", ""]
            ];

            const ws = XLSX.utils.aoa_to_sheet(data);
            ws['!cols'] = [{ wch: 10 }, { wch: 25 }, { wch: 25 }, { wch: 25 }, { wch: 15 }, { wch: 12 }, { wch: 12 }, { wch: 15 }, { wch: 25 }, { wch: 30 }, { wch: 20 }, { wch: 10 }, { wch: 10 }, { wch: 10 }];

            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "상품리스트");
            
            try {
                const excelBuffer = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
                const blob = new Blob([excelBuffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet;charset=UTF-8' });
                const url = window.URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = "도매상품_업로드양식.xlsx";
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                window.URL.revokeObjectURL(url);
            } catch(e) {
                alert('엑셀 다운로드 중 오류가 발생했습니다: ' + e.message);
                XLSX.writeFile(wb, "도매상품_업로드양식.xlsx");
            }
        }

        function handleExcelUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (typeof XLSX === 'undefined') {
                alert("엑셀 처리 라이브러리가 로드되지 않았습니다.\n인터넷 연결을 확인하시거나 페이지를 새로고침 해주세요.");
                event.target.value = '';
                return;
            }

            setTimeout(() => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, {type: 'array'});
                        const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                        const jsonData = XLSX.utils.sheet_to_json(worksheet, { defval: "" });
                        
                        if(jsonData.length === 0) { 
                            alert("엑셀 파일에 데이터가 없습니다. 내용을 다시 확인해주세요."); 
                            event.target.value = '';
                            return; 
                        }

                        const normalizeKey = (key) => key.toString().replace(/\s+/g, '').toLowerCase();

                        let count = 0;
                        const uniqueCategories = new Set();
                        
                        const grid = document.getElementById('catalog-grid');
                        let willClear = false;
                        if (grid.children.length > 0) {
                            willClear = confirm("기존 카드를 모두 지우고 엑셀 데이터로 새로 생성하시겠습니까?\n(취소를 누르면 기존 목록 아래에 추가됩니다.)");
                        }

                        if (willClear) {
                            grid.innerHTML = '';
                        }

                        jsonData.forEach((rawRow, index) => {
                            const row = {};
                            for (let k in rawRow) {
                                row[normalizeKey(k)] = rawRow[k];
                            }

                            const category = row["분류(카테고리)"] || row["분류"] || row["카테고리"] || row["시즌"] || "기본";
                            
                            // 여러 이미지 URL 처리 (1번부터 5번까지)
                            let imgUrls = [];
                            for(let i=1; i<=5; i++) {
                                let url = row[`이미지url${i}`] || row[`이미지${i}`] || row[`사진${i}`] || "";
                                // 1번 칸의 경우 기본 헤더명도 호환 지원
                                if(!url && i===1) {
                                    url = row["이미지url"] || row["이미지"] || row["사진"] || row["url"] || row["이미지주소"] || row["대표이미지"] || "";
                                }
                                
                                if (url && typeof url === 'string') {
                                    url = url.trim();
                                    
                                    // HTML 태그가 통째로 복사되었을 경우 (예: <img src="주소">) src 안의 주소만 추출
                                    if (url.toLowerCase().includes('<img') && url.toLowerCase().includes('src=')) {
                                        const srcMatch = url.match(/src\s*=\s*(['"])(.*?)\1/i);
                                        if (srcMatch && srcMatch[2]) {
                                            url = srcMatch[2];
                                        } else {
                                            url = ""; // 추출 실패 시
                                        }
                                    }

                                    if (url !== '' && !url.startsWith('http') && !url.startsWith('data:')) {
                                        url = 'https://' + url;
                                    }
                                    if (url !== '') {
                                        imgUrls.push(url);
                                    }
                                }
                            }
                            
                            const code = row["품번"] || row["상품코드"] || row["모델명"] || "";
                            const name = row["상품명"] || row["상품"] || row["이름"] || "";
                            const wholesale = formatNumber(row["도매가"]) || formatNumber(row["도매"]) || formatNumber(row["도매단가"]) || "0";
                            const retail = formatNumber(row["소비자가"]) || formatNumber(row["소비자"]) || formatNumber(row["권장소비자가"]) || "0";
                            const material = row["소재"] || row["재질"] || "";
                            const heel = row["굽높이"] || row["굽"] || "";
                            const color = row["컬러"] || row["색상"] || row["색"] || "";
                            const size = row["사이즈"] || row["크기"] || "";

                            if(!name && !code) return; 
                            
                            uniqueCategories.add(category);
                            appendCardHTML(category, imgUrls, code, name, wholesale, retail, material, heel, color, size);
                            count++;
                        });

                        if (count === 0) {
                            const headers = Object.keys(jsonData[0] || {}).join(", ");
                            alert(`데이터를 읽었지만 상품 카드를 생성하지 못했습니다.\n입력하신 엑셀의 첫 번째 줄(헤더)에 '상품명' 또는 '품번' 항목이 있는지 확인해주세요.\n\n[현재 엑셀에서 인식된 항목들]\n${headers}`);
                        } else {
                            generateCategoryFilters(uniqueCategories);
                            alert(count + "개의 상품이 성공적으로 등록되었습니다!\n이미지가 엑스박스로 뜨는 카드는 URL이 잘못된 것입니다. 클릭해서 수정해주세요.");
                        }
                    } catch(error) {
                        console.error("Excel Upload Error: ", error);
                        alert("엑셀 파일을 처리하는 중 오류가 발생했습니다.\n형식이 잘못되었거나 파일이 손상되었을 수 있습니다.\n\n상세 오류: " + error.message);
                    } finally {
                        event.target.value = ''; 
                    }
                };
                
                reader.onerror = function() {
                    alert("파일을 읽을 수 없습니다. 파일이 열려있다면 닫고 다시 시도해주세요.");
                    event.target.value = '';
                };
                
                reader.readAsArrayBuffer(file);
            }, 50);
        }

        function formatNumber(num) {
            if(!num) return "";
            if(typeof num === 'number') return num.toLocaleString('ko-KR');
            const onlyNum = num.toString().replace(/[^0-9]/g, '');
            if(!onlyNum) return num;
            return parseInt(onlyNum).toLocaleString('ko-KR');
        }

        // === 2. 카테고리 필터 기능 ===
        function generateCategoryFilters(categories) {
            const filterContainer = document.getElementById('category-filters');
            filterContainer.innerHTML = '<button class="filter-btn active" onclick="filterCategory(\'ALL\')">전체보기</button>';
            
            categories.forEach(cat => {
                if(cat) {
                    const btn = document.createElement('button');
                    btn.className = 'filter-btn';
                    btn.innerText = cat;
                    // 저장된 HTML에서도 동작하도록 inline onclick 속성으로 부여
                    btn.setAttribute('onclick', `filterCategory('${cat.replace(/'/g, "\\'")}')`);
                    filterContainer.appendChild(btn);
                }
            });
        }

        window.filterCategory = function(category) {
            const btns = document.querySelectorAll('.filter-btn');
            btns.forEach(btn => {
                if(btn.innerText === category || (category === 'ALL' && btn.innerText === '전체보기')) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            const cards = document.querySelectorAll('.ws-card');
            cards.forEach(card => {
                if(category === 'ALL') {
                    card.classList.remove('hidden');
                } else {
                    if(card.getAttribute('data-category') === category) {
                        card.classList.remove('hidden');
                    } else {
                        card.classList.add('hidden');
                    }
                }
            });
        }

        // === 3. 카드 조작 기능 및 슬라이더 로직 ===
        
        window.moveSlide = function(imgBox, direction, event) {
            if(event) { event.stopPropagation(); event.preventDefault(); }
            const container = imgBox.querySelector('.slider-container');
            if(!container) return;
            let current = parseInt(container.getAttribute('data-current'));
            const total = container.querySelectorAll('.slider-img').length;
            current += direction;
            if(current < 0) current = total - 1;
            if(current >= total) current = 0;
            updateSlider(imgBox, container, current);
        }
        
        window.goToSlide = function(imgBox, index, event) {
            if(event) { event.stopPropagation(); event.preventDefault(); }
            const container = imgBox.querySelector('.slider-container');
            if(!container) return;
            updateSlider(imgBox, container, index);
        }
        
        function updateSlider(imgBox, container, current) {
            container.setAttribute('data-current', current);
            const imgs = container.querySelectorAll('.slider-img');
            imgs.forEach(img => {
                img.style.transform = `translateX(-${current * 100}%)`;
            });
            const dots = imgBox.querySelectorAll('.slider-dot');
            dots.forEach((dot, idx) => {
                dot.classList.toggle('active', idx === current);
            });
        }

        function addCard() { appendCardHTML("기본", [], "", "", "", "", "", "", "", ""); }
        function clearAllCards() { 
            if(confirm("정말로 모든 카드를 삭제하시겠습니까?")) {
                document.getElementById('catalog-grid').innerHTML = '';

        // === 4. 이미지 드래그 앤 드롭, 클릭 및 스와이프 기능 ===
        function initDropZone(element) {
            if (element.getAttribute('data-init') === 'true') return;
            element.setAttribute('data-init', 'true');
            
            element.addEventListener('dragover', (e) => { e.preventDefault(); e.stopPropagation(); element.classList.add('drag-over'); });
            element.addEventListener('dragleave', (e) => { e.preventDefault(); e.stopPropagation(); element.classList.remove('drag-over'); });
            element.addEventListener('drop', (e) => {
                e.preventDefault(); e.stopPropagation(); element.classList.remove('drag-over');
                if (!document.body.classList.contains('edit-mode')) return;
                handleFiles(e.dataTransfer.files, element);
            });
            
            // 모바일 스와이프 기능
            let touchstartX = 0;
            let touchendX = 0;
            
            element.addEventListener('touchstart', e => {
                touchstartX = e.changedTouches[0].screenX;
            }, {passive: true});
            
            element.addEventListener('touchend', e => {
                touchendX = e.changedTouches[0].screenX;
                handleSwipe();
            }, {passive: true});
            
            function handleSwipe() {
                if(!element.querySelector('.slider-container')) return;
                const threshold = 30; // 스와이프 인식 최소 거리
                if (touchendX < touchstartX - threshold) {
                    moveSlide(element, 1);
                }
                if (touchendX > touchstartX + threshold) {
                    moveSlide(element, -1);
                }
            }
            
            element.addEventListener('click', (e) => {
                // 슬라이더 버튼이나 편집 툴바 클릭 시 무시
                if(e.target.closest('.slider-btn') || e.target.closest('.slider-dot') || e.target.closest('.img-edit-toolbar')) {
                    return;
                }

                if (!document.body.classList.contains('edit-mode')) {
                    openModal(element.closest('.ws-card'));
                    return;
                }
                
                const useFile = confirm("[확인]을 누르면 컴퓨터에서 이미지 파일을 추가합니다.\n[취소]를 누르면 인터넷 이미지 URL 주소를 입력합니다.");
                
                if (useFile) {
                    const input = document.createElement('input');
                    input.type = 'file'; input.accept = 'image/*';
                    input.multiple = true;
                    input.onchange = (e) => handleFiles(e.target.files, element);
                    input.click();
                } else {
                    let url = prompt("이미지 URL 주소를 붙여넣으세요:\n(예: https://example.com/image.jpg)");
                    if (url && url.trim() !== "") {
                        url = url.trim();
                        if (!url.startsWith('http') && !url.startsWith('data:')) url = 'https://' + url;

                        let existingUrls = [];
                        if(element.classList.contains('filled')) {
                            const container = element.querySelector('.slider-container');
                            if (container) {
                                existingUrls = Array.from(container.querySelectorAll('.slider-img')).map(img => img.src);
                            } else {
                                const singleImg = element.querySelector('.preview-img');
                                if(singleImg) existingUrls.push(singleImg.src);
                            }
                        }

                        if (existingUrls.length >= 5) {
                            alert("이미지는 최대 5장까지만 등록할 수 있습니다.");
                            return;
                        }

                        const allUrls = [...existingUrls, url];
                        renderImages(element, allUrls, existingUrls.length);
                    }
                }
            });
        }

        window.openModal = function(card) {
            const modal = document.getElementById('productModal');
            const modalImg = document.getElementById('modalImg');
            const modalInfo = document.getElementById('modalInfo');

            // 이미지 영역 클론
            const imgBox = card.querySelector('.img-box').cloneNode(true);
            imgBox.style.position = 'absolute';
            imgBox.style.top = '0'; imgBox.style.left = '0'; imgBox.style.width = '100%'; imgBox.style.height = '100%';
            imgBox.style.cursor = 'default';
            modalImg.innerHTML = '';
            modalImg.appendChild(imgBox);

            // 모달 안에서도 스와이프가 되도록 이벤트 재바인딩
            let touchstartX = 0; let touchendX = 0;
            imgBox.addEventListener('touchstart', e => { touchstartX = e.changedTouches[0].screenX; }, {passive: true});
            imgBox.addEventListener('touchend', e => {
                touchendX = e.changedTouches[0].screenX;
                if(!imgBox.querySelector('.slider-container')) return;
                if (touchendX < touchstartX - 30) moveSlide(imgBox, 1);
                if (touchendX > touchstartX + 30) moveSlide(imgBox, -1);
            }, {passive: true});

            // 정보 영역 클론

                el.removeAttribute('contenteditable');
                el.classList.remove('editable');
            });
            modalInfo.innerHTML = '';
            modalInfo.appendChild(infoBox);

            modal.classList.add('show');
            document.body.style.overflow = 'hidden'; // 배경 스크롤 방지
        }

        window.closeModal = function(e) {
            const modal = document.getElementById('productModal');
            modal.classList.remove('show');
            document.body.style.overflow = '';
        }

        window.shiftImg = function(imgBox, direction, event) {
            if(event) { event.stopPropagation(); event.preventDefault(); }
            const container = imgBox.querySelector('.slider-container');
            let urls = [];
            let current = 0;
            if (container) {
                urls = Array.from(container.querySelectorAll('.slider-img')).map(img => img.src);
                current = parseInt(container.getAttribute('data-current')) || 0;
            } else {
                const singleImg = imgBox.querySelector('.preview-img');
                if(singleImg) urls.push(singleImg.src);
            }
            if(urls.length <= 1) return;

            let target = current + direction;
            if(target < 0 || target >= urls.length) return; // 끝에서는 순서 변경 안함

            // Swap URLs
            const temp = urls[current];
            urls[current] = urls[target];
            urls[target] = temp;

            renderImages(imgBox, urls, target);
        };

        window.removeImg = function(imgBox, event) {
            if(event) { event.stopPropagation(); event.preventDefault(); }
            if(!confirm("현재 보고 있는 이미지를 삭제하시겠습니까?")) return;
            const container = imgBox.querySelector('.slider-container');
            let urls = [];
            let current = 0;
            if (container) {
                urls = Array.from(container.querySelectorAll('.slider-img')).map(img => img.src);
                current = parseInt(container.getAttribute('data-current')) || 0;
            } else {
                const singleImg = imgBox.querySelector('.preview-img');
                if(singleImg) urls.push(singleImg.src);
            }

            urls.splice(current, 1);
            let nextCurrent = current >= urls.length ? Math.max(0, urls.length - 1) : current;
            renderImages(imgBox, urls, nextCurrent);
        };

        function renderImages(element, urls, currentIndex = 0) {
            element.innerHTML = '';
            if (urls.length === 0) {
                element.classList.remove('filled');
                return;
            }
            element.classList.add('filled');

            const editToolbar = `
                <div class="img-edit-toolbar" onclick="event.stopPropagation(); event.preventDefault();">
                    <button onclick="shiftImg(this.closest('.img-box'), -1, event)" title="왼쪽으로 이동">◀</button>
                    <button onclick="removeImg(this.closest('.img-box'), event)" title="이 이미지 삭제" style="color:#ef4444; font-size:16px;">✖</button>
                    <button onclick="shiftImg(this.closest('.img-box'), 1, event)" title="오른쪽으로 이동">▶</button>
                </div>
            `;
            
            if (urls.length === 1) {
                element.innerHTML = `<img src="${urls[0]}" class="preview-img">${editToolbar}`;
            } else {
                let slides = urls.map((url, idx) => `<img src="${url}" class="slider-img" data-idx="${idx}">`).join('');
                let dots = urls.map((_, idx) => `<div class="slider-dot ${idx===currentIndex?'active':''}" onclick="goToSlide(this.closest('.img-box'), ${idx}, event)"></div>`).join('');
                
                element.innerHTML = `
                    <div class="slider-container" data-current="${currentIndex}">
                        ${slides}
                    </div>
                    <button class="slider-btn prev" onclick="moveSlide(this.closest('.img-box'), -1, event)">&#10094;</button>
                    <button class="slider-btn next" onclick="moveSlide(this.closest('.img-box'), 1, event)">&#10095;</button>
                    <div class="slider-dots">${dots}</div>
                    ${editToolbar}
                `;
                // 초기 트랜스폼 적용
                updateSlider(element, element.querySelector('.slider-container'), currentIndex);
            }
        }

        function handleFiles(files, element) {
            if (!files || files.length === 0) return;
            
            const imageFiles = Array.from(files).filter(f => f.type.startsWith('image/'));
            if (imageFiles.length === 0) {
                alert('이미지 파일만 올려주세요.');
                return;
            }

            // 기존 이미지 URL 가져오기
            let existingUrls = [];
            if(element.classList.contains('filled')) {
                const container = element.querySelector('.slider-container');
                if (container) {
                    existingUrls = Array.from(container.querySelectorAll('.slider-img')).map(img => img.src);
                } else {
                    const singleImg = element.querySelector('.preview-img');
                    if(singleImg) existingUrls.push(singleImg.src);
                }
            }

            // 최대 5장 제한 안내
            if (existingUrls.length + imageFiles.length > 5) {
                alert(`이미지는 최대 5장까지만 등록할 수 있습니다.\n기존 ${existingUrls.length}장 + 새로 추가 시도 ${imageFiles.length}장`);
                imageFiles.splice(5 - existingUrls.length); // 들어갈 수 있는 만큼만 자름
                if (imageFiles.length === 0) return;
            }

            const readPromises = imageFiles.map(file => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => resolve(e.target.result);
                    reader.readAsDataURL(file);
                });
            });

            Promise.all(readPromises).then(results => {
                const allUrls = [...existingUrls, ...results];
                renderImages(element, allUrls, existingUrls.length); // 추가된 첫 번째 사진 위치로 이동
            });
        }

        // === 5. 로컬 스토리지 자동 저장 기능 ===
        let autoSaveTimeout;
        function saveStateToLocal() {
            clearTimeout(autoSaveTimeout);
            autoSaveTimeout = setTimeout(() => {
                const gridHtml = document.getElementById('catalog-grid').innerHTML;
                const headerHtml = document.querySelector('.catalog-header').innerHTML;

                try {
                    localStorage.setItem('ws_catalog_grid', gridHtml);
                    localStorage.setItem('ws_catalog_header', headerHtml);
                    localStorage.setItem('ws_catalog_filters', filtersHtml);
                } catch(e) {
                    console.warn('용량 초과로 자동 저장에 실패했습니다. (사진 여러 장 삽입 시 발생할 수 있음)');
                }
            }, 1000);
        }

        const domObserver = new MutationObserver(saveStateToLocal);

        document.addEventListener('DOMContentLoaded', () => {
            // 새로고침 시 저장된 데이터 복구
            const savedGrid = localStorage.getItem('ws_catalog_grid');
            const savedHeader = localStorage.getItem('ws_catalog_header');

                document.getElementById('catalog-grid').innerHTML = savedGrid;

                    initDropZone(box);
                });
                
                // 복구된 뱃지 이벤트 재바인딩
                document.querySelectorAll('.ws-category-badge').forEach(badge => {
                    badge.addEventListener('blur', function() {
                        const card = this.closest('.ws-card');
                        if(card) card.setAttribute('data-category', this.innerText.trim());
                    });
                });
            }
            
            if (savedHeader) document.querySelector('.catalog-header').innerHTML = savedHeader;
            if (savedFilters) document.getElementById('category-filters').innerHTML = savedFilters;

            // DOM 변화 감지 시작 (자동저장 트리거)
            domObserver.observe(document.getElementById('catalog-grid'), { childList: true, subtree: true, characterData: true, attributes: true });
            domObserver.observe(document.querySelector('.catalog-header'), { childList: true, subtree: true, characterData: true });
            
            document.addEventListener('input', (e) => {
                if(e.target.hasAttribute('contenteditable')) saveStateToLocal();
            }, false);
        });

        // === 5. 최종 HTML 저장 기능 ===
        function saveHTML() {
            try {
                filterCategory('ALL');

                const clone = document.documentElement.cloneNode(true);
                clone.querySelector('body').classList.remove('edit-mode');
                clone.querySelectorAll('.delete-btn').forEach(btn => btn.remove());
                clone.querySelectorAll('.toolbar').forEach(tb => tb.remove());
                clone.querySelectorAll('.guide-box').forEach(gb => gb.remove());
                clone.querySelectorAll('.img-edit-toolbar').forEach(tb => tb.remove());
                
                clone.querySelectorAll('.img-box').forEach(box => {
                    box.removeAttribute('data-init');
                });
                clone.querySelectorAll('[contenteditable]').forEach(el => {
                    el.removeAttribute('contenteditable');
                    el.classList.remove('editable');
                });
                
                clone.querySelectorAll('script[src*="xlsx"]').forEach(s => s.remove());

                const blob = new Blob(["<!DOCTYPE html>\n" + clone.outerHTML], { type: 'text/html' });
                const filename = 'Wholesale_Catalog_' + new Date().toISOString().slice(0,10) + '.html';
                const link = document.createElement('a'); 
                link.href = URL.createObjectURL(blob); 
                link.download = filename;
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
            } catch (e) { alert('저장 오류: ' + e.message); }
        }

        // 저장된 뷰 모드용 전역 클릭 이벤트 (모달 띄우기)
        document.addEventListener('click', function(e) {
            if (!document.body.classList.contains('edit-mode')) {
                const imgBox = e.target.closest('.img-box');
                if (imgBox && !e.target.classList.contains('slider-btn') && !e.target.classList.contains('slider-dot')) {
                    const card = imgBox.closest('.ws-card');
                    if(card) openModal(card);
                }
            }
        });
        // === 6. 현재 화면 엑셀로 내보내기 기능 ===
        function exportToExcel() {
            if (typeof XLSX === 'undefined') {
                alert("엑셀 처리 라이브러리가 로드되지 않았습니다.");
                return;
            }

            const cards = document.querySelectorAll('.ws-card');
            if (cards.length === 0) {
                alert("내보낼 상품 데이터가 없습니다.");
                return;
            }

            const headers = ["품번", "컬러", "사이즈", "소재", "굽높이", "도매가", "소비자가", "분류(카테고리)", "상품명", "이미지URL1", "이미지URL2", "이미지URL3", "이미지URL4", "이미지URL5"];
            const data = [headers];

            cards.forEach(card => {
                const category = card.querySelector('.ws-category-badge')?.innerText.trim() || "";
                const code = card.querySelector('.ws-code')?.innerText.trim() || "";
                const name = card.querySelector('.ws-name')?.innerText.trim() || "";
                
                const prices = card.querySelectorAll('.ws-price-box .editable');
                let wholesale = "";
                let retail = "";
                if (prices.length >= 2) {
                    wholesale = prices[0].innerText.replace(/[^0-9]/g, '');
                    retail = prices[1].innerText.replace(/[^0-9]/g, '');
                }

                const specs = card.querySelectorAll('.ws-specs td');
                const material = specs[0]?.innerText.trim() || "";
                const heel = specs[1]?.innerText.trim() || "";
                const color = specs[2]?.innerText.trim() || "";
                const size = specs[3]?.innerText.trim() || "";

                // 이미지 URL 추출 (최대 5개)
                const imgUrls = [];
                const imgs = card.querySelectorAll('.img-box img');
                imgs.forEach(img => {
                    const src = img.getAttribute('src');
                    // base64 등 긴 데이터는 제외하고 일반 URL만 추출 (옵션에 따라 base64 허용 가능)
                    if (src && !src.startsWith('data:image')) {
                        imgUrls.push(src);
                    }
                });

                // 5개까지 빈 문자열로 채우기
                while (imgUrls.length < 5) {
                    imgUrls.push("");
                }

                data.push([
                    code, color, size, material, heel, wholesale, retail, category, name, 
                    imgUrls[0], imgUrls[1], imgUrls[2], imgUrls[3], imgUrls[4]
                ]);
            });

            const ws = XLSX.utils.aoa_to_sheet(data);
            ws['!cols'] = [{ wch: 10 }, { wch: 25 }, { wch: 25 }, { wch: 25 }, { wch: 15 }, { wch: 12 }, { wch: 12 }, { wch: 15 }, { wch: 25 }, { wch: 30 }, { wch: 20 }, { wch: 10 }, { wch: 10 }, { wch: 10 }];
            
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "상품리스트_내보내기");

            try {
                const excelBuffer = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
                const blob = new Blob([excelBuffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet;charset=UTF-8' });
                const url = window.URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `도매상품리스트_${new Date().toISOString().slice(0,10)}.xlsx`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                window.URL.revokeObjectURL(url);
            } catch(e) {
                alert('엑셀 내보내기 중 오류가 발생했습니다: ' + e.message);
            }
        }
    </script>
